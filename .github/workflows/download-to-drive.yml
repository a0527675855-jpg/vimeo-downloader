name: Download Video
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URL to download'
        required: true
      quality:
        description: 'Quality (360/480/720)'
        required: true
        default: '480'
  repository_dispatch:
    types: [html_download]

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Install yt-dlp
        run: pip install -U yt-dlp

      - name: Download video
        run: |
          mkdir -p videos
          QUALITY_INPUT="${{ github.event.inputs.quality || github.event.client_payload.quality }}"
          URL_INPUT="${{ github.event.inputs.url || github.event.client_payload.url }}"
          
          if [ "$QUALITY_INPUT" = "360" ]; then
            FORMAT="bestvideo[height<=360]+bestaudio/best[height<=360]"
          elif [ "$QUALITY_INPUT" = "720" ]; then
            FORMAT="bestvideo[height<=720]+bestaudio/best[height<=720]"
          else
            FORMAT="bestvideo[height<=480]+bestaudio/best[height<=480]"
          fi

          yt-dlp \
            -f "$FORMAT" \
            --no-overwrites \
            -o "videos/%(title)s [%(id)s].%(ext)s" \
            "$URL_INPUT" 2>&1 || true
            
          echo "=== Files ==="
          ls -lh videos/

      - name: Install Rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Setup Rclone Config
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG_DATA }}" > ~/.config/rclone/rclone.conf

      - name: Upload Videos to Google Drive
        run: |
          rclone copy videos gdrive2:VimeoDownloads

      - name: Upload to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: videos/
          retention-days: 7
          if-no-files-found: warn
